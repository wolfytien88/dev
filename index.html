<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CYBER VENOM — 賽博毒蛇</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>CYBER VENOM</h1>
  <div id="game">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="info">分數: <span id="score">0</span></div>
    <div id="controls">
      <button id="pauseBtn" aria-label="暫停">暫停</button>
      <select id="speedSelect" aria-label="速度">
        <option value="160">慢</option>
        <option value="120" selected>普通</option>
        <option value="70">快</option>
      </select>
      <button id="restartBtn" aria-label="重新開始">重新開始</button>
    </div>
    <aside id="leaderboard">
      <h2>排行榜</h2>
      <ol id="scoresList"></ol>
    </aside>
  </div>
  <script src="script.js"></script>
</body>
</html>
